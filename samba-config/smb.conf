# /etc/samba/smb.conf
# Rocky Linux Samba File Sharing Configuration
# Domain: shadow.com | Server IP: 192.168.200.5

[global]
    workgroup = WORKGROUP
    server string = Rocky Linux Samba Server
    netbios name = rocky-server
    security = user
    map to guest = bad user
    dns proxy = no

    log file = /var/log/samba/log.%m
    max log size = 50
    log level = 1

    passdb backend = tdbsam

[shared]
    comment = Samba Shared Directory
    path = /srv/samba/shared
    browsable = yes
    writable = yes
    valid users = @smbgroup
    create mask = 0660
    directory mask = 0770
    force group = smbgroup
