# /etc/vsftpd/vsftpd.conf
# Rocky Linux FTP Server Configuration (vsftpd)

# --- Access Control ---
anonymous_enable=NO
local_enable=YES
write_enable=YES

# --- File Permissions ---
#local_umask=022
dirmessage_enable=YES

# --- Logging ---
xferlog_enable=YES
connect_from_port_20=YES
xferlog_std_format=YES

# --- ASCII Mode ---
ascii_upload_enable=YES
ascii_download_enable=YES

# --- Chroot Jail ---
chroot_local_user=YES
chroot_list_enable=YES
allow_writeable_chroot=YES
chroot_list_file=/etc/vsftpd/chroot_list

# --- Network ---
listen=NO
listen_ipv6=YES

# --- Authentication ---
pam_service_name=vsftpd
userlist_enable=YES

# --- Recursive Listing ---
ls_recurse_enable=YES

# --- Extra Settings ---
local_root=public_html
use_localtime=YES
seccomp_sandbox=NO
