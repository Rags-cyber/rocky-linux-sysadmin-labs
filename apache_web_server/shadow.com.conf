# /etc/httpd/conf.d/shadow.com.conf
# Rocky Linux Apache Virtual Host Configuration
# Domain: shadow.com | Server IP: 192.168.200.5

# HTTP — Redirect to HTTPS
<VirtualHost *:80>
    ServerName shadow.com
    ServerAlias www.shadow.com
    DocumentRoot /var/www/shadow.com/html
    Redirect permanent / https://shadow.com/
</VirtualHost>

# HTTPS — Main Virtual Host
<VirtualHost *:443>
    ServerName shadow.com
    ServerAlias www.shadow.com
    DocumentRoot /var/www/shadow.com/html

    SSLEngine on
    SSLCertificateFile      /etc/ssl/shadow.com/selfsigned.crt
    SSLCertificateKeyFile   /etc/ssl/shadow.com/privatekey.key

    <Directory /var/www/shadow.com/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/shadow.com_error.log
    CustomLog /var/log/httpd/shadow.com_access.log combined
</VirtualHost>
