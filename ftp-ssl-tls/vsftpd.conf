# /etc/vsftpd/vsftpd.conf
# Rocky Linux FTP with SSL/TLS (FTPS)
# Certificate: /etc/ssl/vsftpd/selfsigned.crt
# Key:         /etc/ssl/vsftpd/privatekey.key

# --- Base FTP Settings ---
anonymous_enable=NO
local_enable=YES
write_enable=YES
dirmessage_enable=YES
xferlog_enable=YES
connect_from_port_20=YES
xferlog_std_format=YES
listen=NO
listen_ipv6=YES
pam_service_name=vsftpd
userlist_enable=YES

# --- SSL/TLS Settings ---
ssl_enable=YES
ssl_tlsv1_2=YES
ssl_sslv2=NO
ssl_sslv3=NO

rsa_cert_file=/etc/ssl/vsftpd/selfsigned.crt
rsa_private_key_file=/etc/ssl/vsftpd/privatekey.key

# --- SSL Hardening ---
allow_anon_ssl=NO
force_local_data_ssl=YES
force_local_logins_ssl=YES
ssl_ciphers=HIGH
require_ssl_reuse=NO

# --- Passive Mode Ports ---
pasv_min_port=40000
pasv_max_port=40001

# --- Debugging ---
debug_ssl=YES
